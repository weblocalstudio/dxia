<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> DXIA - Tienda</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
    <link rel="manifest" href="/favicon/site.webmanifest">
</head>
<body>
    <div class="pantalla-carga" id="loader"></div>

    <div class="capa-borrosa" id="capaBorrosa"></div>

    <header class="header">
        <div class="logo" id="logo">
            <img src="../img/logo_dxia.png" alt="DXIA">
        </div>

        <nav class="menu-escritorio">
            <ul>
                <li><a href="/#inicio">Inicio</a></li>
                <li><a href="/#equipo">Equipo</a></li>
                <li><a href="/#servicios">Servicios</a></li>
                <li><a href="/#formacion">Formación</a></li>
                <li><a href="/#casos">Casos</a></li>
                <li><a href="/contacto/">Contacto</a></li>
                <li><a href="#" style="color: #00bfa5;">Tienda</a></li>
            </ul>
        </nav>

        <button class="btn-hamburguesa" id="btnAbrir">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </header>

    <nav class="menu-lateral" id="menuLateral">
        <div class="cerrar-menu" id="btnCerrar">&times;</div>
        <ul>
            <li><a href="/#inicio" onclick="cerrarMenu()">Inicio</a></li>
            <li><a href="/#equipo" onclick="cerrarMenu()">Equipo</a></li>
            <li><a href="/#servicios" onclick="cerrarMenu()">Servicios</a></li>
            <li><a href="/#formacion" onclick="cerrarMenu()">Formación</a></li>
            <li><a href="/#casos" onclick="cerrarMenu()">Casos</a></li>
            <li><a href="/contacto/" onclick="cerrarMenu()">Contacto</a></li>
            <li><a href="#" onclick="cerrarMenu()" style="color: #00bfa5;">Tienda</a></li>
        </ul>
    </nav>

    <main>
        <section class="tienda">
            <h1>Bienvenido a la Tienda DXIA</h1>
        </section>

        <div class="cont-shop" id="cont-shop">
                
        </div>

    </main>

    <footer class="footer" style="position: fixed; right: 0; left: 0; bottom: 0;">
        <p>&copy; 2026 DXIA - Diagnóstico por Imagen Ambulante. Todos los derechos reservados.</p>
    </footer>

    <div class="menu-flotante">
        <div class="botones-redes">
            <a href="https://www.instagram.com/teresamarti_dxia" class="btn-red instagram" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="https://wa.me/34670584567" class="btn-red whatsapp" target="_blank" rel="noopener noreferrer">
                <i class="fab fa-whatsapp"></i>
            </a>
        </div>
    
        <div class="btn-principal">
            <i class="fas fa-plus"></i>
        </div>
    </div>

    <script src="../script.js"></script>
    <script>
        const shop = document.getElementById('cont-shop');

        const productos = [
            {id: 1, nombre: "Bozal", precio: 10, img: "../img/bozal.jpg"},
        ];

        window.onload = () => {
            productos.forEach(p => {
                shop.innerHTML += `
                <div class="card" data-aos="fade-up">
                <div class="img-container">
                ${p.img ? `<img src="${p.img}" alt="${p.nombre}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">` : ''}
                <span class="img-placeholder" style="${p.img ? 'display:none;' : 'display:block;'}">DXIA</span>
                </div>
                <h3>${p.nombre}</h3>
                <p class="price">${p.precio}€</p>
                <button class="btn-add" onclick="agregarAlCarrito(${p.id})">Añadir a la Cesta</button>
                </div>
                `;
            })
        }
    </script>
</body>
</html>
